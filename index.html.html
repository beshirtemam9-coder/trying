<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register Here</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #3bbfad;
      font-family: 'Nunito', sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 48px 52px;
      width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      color: #3bbfad;
      font-size: 1.9rem;
      font-weight: 800;
      margin-bottom: 24px;
    }

    .social-icons {
      display: flex;
      justify-content: center;
      gap: 14px;
      margin-bottom: 28px;
    }

    .social-icons a {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s, transform 0.2s;
    }

    .social-icons a:hover {
      border-color: #3bbfad;
      color: #3bbfad;
      transform: translateY(-2px);
    }

    .social-icons svg { width: 18px; height: 18px; fill: currentColor; }

    .input-group {
      position: relative;
      margin-bottom: 14px;
    }

    .input-group .icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      display: flex;
      align-items: center;
    }

    .input-group .icon svg { width: 18px; height: 18px; fill: currentColor; }

    .input-group input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: none;
      border-radius: 8px;
      background: #f2f2f2;
      font-size: 0.95rem;
      font-family: 'Nunito', sans-serif;
      color: #555;
      outline: none;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .input-group input::placeholder { color: #aaa; }

    .input-group input:focus {
      background: #e9f9f7;
      box-shadow: 0 0 0 2px #3bbfad55;
    }

    .btn-register {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      border: none;
      border-radius: 50px;
      background: #3bbfad;
      color: #fff;
      font-size: 1rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(59,191,173,0.35);
    }

    .btn-register:hover {
      background: #32ab9b;
      transform: translateY(-1px);
    }</style>
</head>
<body>
  <div class="card">
    <h1>Register Here</h1>

    <div class="social-icons">
      <a href="#" aria-label="Facebook">
        <svg viewBox="0 0 24 24"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
      </a>
      <a href="#" aria-label="Twitter">
        <svg viewBox="0 0 24 24"><path d="M23 3a10.9 10.9 0 0 1-3.14 1.53 4.48 4.48 0 0 0-7.86 3v1A10.66 10.66 0 0 1 3 4s-4 9 5 13a11.64 11.64 0 0 1-7 2c9 5 20 0 20-11.5a4.5 4.5 0 0 0-.08-.83A7.72 7.72 0 0 0 23 3z"/></svg>
      </a>
      <a href="#" aria-label="Google">
        <svg viewBox="0 0 24 24"><path d="M21.35 11.1H12v2.8h5.35C16.7 16.1 14.55 17.5 12 17.5c-3.04 0-5.5-2.46-5.5-5.5s2.46-5.5 5.5-5.5c1.4 0 2.67.52 3.64 1.36l2.12-2.12A9.46 9.46 0 0 0 12 3C7.03 3 3 7.03 3 12s4.03 9 9 9c5.22 0 8.7-3.67 8.7-8.83 0-.6-.06-1.1-.15-1.07z"/></svg>
      </a>
    </div>

    <div class="input-group">
      <span class="icon">
        <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </span>
      <input type="text" placeholder="Name" autocomplete="name"/>
    </div>

    <div class="input-group">
      <span class="icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </span>
      <input type="email" placeholder="Email" autocomplete="email"/>
    </div>

    <div class="input-group">
      <span class="icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </span>
      <input type="password" placeholder="Password" autocomplete="new-password"/>
    </div>

    <button class="btn-register">Register</button>
  </div>
</body>
</html>
